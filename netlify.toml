[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Build do Vite usa proxy /api/anthropic (função Netlify abaixo) em produção — evita CORS no Claude.
  VITE_ANTHROPIC_PROXY = "true"

[functions]
  directory = "netlify/functions"

# Proxy Anthropic (tem de ficar ANTES do fallback SPA).
[[redirects]]
  from = "/api/anthropic/*"
  to = "/.netlify/functions/anthropic-proxy"
  status = 200
  force = true

# Extrair texto HTML de URLs (Fontes & referências → IA).
[[redirects]]
  from = "/api/fetch-source"
  to = "/.netlify/functions/fetch-source"
  status = 200
  force = true

# Ficheiros em `dist` (CSS/JS hashed) continuam servidos normalmente.
# Esta regra só aplica quando o caminho não corresponde a nenhum ficheiro —
# típico de SPAs quando alguém abre uma URL diretamente ou recarrega.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html NUNCA cacheia — assim o browser sempre puxa a versão nova que
# referencia os chunks JS/CSS atuais. Sem isso, deploy novo deixa browsers com
# HTML antigo apontando pra chunks que já não existem ("Failed to fetch...").
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Assets com hash (CSS/JS/imagens) podem cachear longo — o hash no nome
# invalida automaticamente quando muda.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
